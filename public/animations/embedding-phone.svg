    <path d="M 62 24
             L 77 24
             Q 80 24 80 27
             L 80 30
             Q 80 35 85 35
             L 115 35
             Q 120 35 120 30
             L 120 27
             Q 120 24 123 24
             L 138 24
             A 18 18 0 0 1 156 42
             L 156 218
             A 18 18 0 0 1 138 236
             L 62 236
             A 18 18 0 0 1 44 218
             L 44 42
             A 18 18 0 0 1 62 24 Z"
          fill="#eee" stroke="#6366f1" stroke-width="1.5"/>
    <text x="100" y="82" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#6366f1">swift app</text>
    <rect x="70" y="160" width="60" height="40" rx="4" fill="#eee" stroke="#d97706" stroke-width="1.5"/>
    <text x="100" y="186" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#d97706">iroh</text>
  </g>

