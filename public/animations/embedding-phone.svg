<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <style>/* transparent-canvas */ :root { background-color: transparent; color-scheme: light dark; }</style>
  <!-- ========== iPhone ========== -->
  <g>
