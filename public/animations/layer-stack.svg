<svg viewBox="0 0 680 465" xmlns="http://www.w3.org/2000/svg">
  <style>/* transparent-canvas */ :root { background-color: transparent; color-scheme: light dark; }</style>

  <!-- ========== your application (container) ========== -->
  <rect x="70" y="24" width="540" height="294" rx="12" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <text x="88" y="54" font-family="'Space Mono', monospace" font-size="16" font-weight="bold" fill="#d97706">Your application</text>
  <text x="592" y="54" text-anchor="end" font-family="'Space Mono', monospace" font-size="12" fill="#6366f1">iroh — embedded library</text>

  <!-- ========== iroh box: one rounded box, layers touch ========== -->
  <rect x="88" y="72" width="504" height="230" rx="8" fill="#e5e7eb"/>
  <text x="340.0" y="91" text-anchor="middle" font-family="'Space Mono', monospace" font-size="14" font-weight="bold" fill="#111">Protocols</text>
  <text x="340.0" y="107" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10.5" fill="#888">blobs · gossip · yours</text>
  <line x1="88" y1="118" x2="592" y2="118" stroke="#cbd0d8" stroke-width="1"/>
  <text x="340.0" y="137" text-anchor="middle" font-family="'Space Mono', monospace" font-size="14" font-weight="bold" fill="#111">Router</text>
  <text x="340.0" y="153" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10.5" fill="#888">dispatches connections by ALPN</text>
  <line x1="88" y1="164" x2="592" y2="164" stroke="#cbd0d8" stroke-width="1"/>
  <text x="340.0" y="183" text-anchor="middle" font-family="'Space Mono', monospace" font-size="14" font-weight="bold" fill="#111">Endpoint</text>
  <text x="340.0" y="199" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10.5" fill="#888">identity · address lookup · NAT · relay</text>
  <line x1="88" y1="210" x2="592" y2="210" stroke="#cbd0d8" stroke-width="1"/>
  <text x="340.0" y="229" text-anchor="middle" font-family="'Space Mono', monospace" font-size="14" font-weight="bold" fill="#111">QUIC + TLS 1.3</text>
  <text x="340.0" y="245" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10.5" fill="#888">encryption · auth · stream mux</text>
  <line x1="88" y1="256" x2="592" y2="256" stroke="#cbd0d8" stroke-width="1"/>
  <text x="340.0" y="275" text-anchor="middle" font-family="'Space Mono', monospace" font-size="14" font-weight="bold" fill="#111">Transport</text>
  <text x="340.0" y="291" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10.5" fill="#888">UDP and relay by default · swappable</text>

