<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <style>/* transparent-canvas */ :root { background-color: transparent; color-scheme: light dark; }</style>
  <!-- 14s loop (SMIL):
       0-1s   IP1 valid
       1-2s   IP1 struck
       2-3s   IP2 valid
       3-4s   IP2 struck
       4-5s   IP3 valid
       5-6s   keys appear, "connect" label + unidirectional arrow
       6s     arrow becomes bidirectional, "connect" label vanishes
       7-8s   IP3 struck (network change while connected)
       8-14s  IP4 valid, connection stays bidirectional -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- ========== IPs at top row ========== -->
  <text x="200" y="30" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#888">10.0.0.42</text>

  <text x="600" y="30" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#888" opacity="1">192.168.1.7<animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.13;0.15;1" values="1;1;0;0"/></text>
  <line x1="560" y1="26" x2="640" y2="26" stroke="#dc2626" stroke-width="1.5" opacity="0"><animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.06;0.08;0.13;0.15;1" values="0;0;1;1;0;0"/></line>
  <text x="600" y="30" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#888" opacity="0">203.0.113.15<animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.13;0.15;0.28;0.3;1" values="0;0;1;1;0;0"/></text>
  <line x1="555" y1="26" x2="645" y2="26" stroke="#dc2626" stroke-width="1.5" opacity="0"><animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.2;0.22;0.28;0.3;1" values="0;0;1;1;0;0"/></line>
  <text x="600" y="30" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#888" opacity="0">172.20.4.88<animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.28;0.3;0.56;0.58;1" values="0;0;1;1;0;0"/></text>
  <line x1="560" y1="26" x2="640" y2="26" stroke="#dc2626" stroke-width="1.5" opacity="0"><animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.49;0.51;0.56;0.58;1" values="0;0;1;1;0;0"/></line>
  <text x="600" y="30" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#888" opacity="0">192.168.10.55<animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.56;0.58;1" values="0;0;1;1"/></text>

  <!-- ========== Alice (iPhone) ========== -->
  <rect x="140" y="60" width="120" height="220" rx="22" fill="#eee" stroke="#888" stroke-width="1.5"/>
  <path d="M 162 64
           L 177 64
           Q 180 64 180 67
           L 180 70
           Q 180 75 185 75
           L 215 75
           Q 220 75 220 70
           L 220 67
           Q 220 64 223 64
           L 238 64
           A 18 18 0 0 1 256 82
           L 256 258
           A 18 18 0 0 1 238 276
           L 162 276
           A 18 18 0 0 1 144 258
           L 144 82
           A 18 18 0 0 1 162 64 Z"
        fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="170" y="150" width="60" height="40" rx="4" fill="#eee" stroke="#d97706" stroke-width="1.5"/>
  <text x="200" y="176" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#d97706">iroh</text>
  <g opacity="0"><animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.35;0.37;1" values="0;0;1;1"/><path d="M 168.10 204.70 a 3.74 3.74 0 1 0 7.48 0 a 3.74 3.74 0 1 0 -7.48 0 Z M 170.19 204.70 a 1.65 1.65 0 1 0 3.30 0 a 1.65 1.65 0 1 0 -3.30 0 Z" fill="#eab308" fill-rule="evenodd"/><rect x="171.84" y="203.71" width="10.56" height="1.98" fill="#eab308"/><rect x="180.97" y="205.69" width="1.43" height="3.30" fill="#eab308"/><rect x="177.67" y="205.69" width="1.43" height="2.20" fill="#eab308"/><text x="185.70" y="208" text-anchor="start" font-family="'Space Mono', monospace" font-size="11" fill="#d97706">a4f7c0…</text></g>

  <!-- ========== Bob (Android) ========== -->
  <rect x="540" y="60" width="120" height="220" rx="22" fill="#eee" stroke="#888" stroke-width="1.5"/>
  <rect x="544" y="64" width="112" height="212" rx="18" fill="#eee" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="600" cy="76" r="3" fill="#888"/>
  <rect x="570" y="150" width="60" height="40" rx="4" fill="#eee" stroke="#d97706" stroke-width="1.5"/>
  <text x="600" y="176" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#d97706">iroh</text>
  <g opacity="0"><animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.35;0.37;1" values="0;0;1;1"/><path d="M 568.10 204.70 a 3.74 3.74 0 1 0 7.48 0 a 3.74 3.74 0 1 0 -7.48 0 Z M 570.19 204.70 a 1.65 1.65 0 1 0 3.30 0 a 1.65 1.65 0 1 0 -3.30 0 Z" fill="#eab308" fill-rule="evenodd"/><rect x="571.84" y="203.71" width="10.56" height="1.98" fill="#eab308"/><rect x="580.97" y="205.69" width="1.43" height="3.30" fill="#eab308"/><rect x="577.67" y="205.69" width="1.43" height="2.20" fill="#eab308"/><text x="585.70" y="208" text-anchor="start" font-family="'Space Mono', monospace" font-size="11" fill="#d97706">8e2b1d…</text></g>

  <!-- ========== User labels ========== -->
  <text x="200" y="305" text-anchor="middle" font-family="'Space Mono', monospace" font-size="16" fill="#6366f1">Alice</text>
  <text x="600" y="305" text-anchor="middle" font-family="'Space Mono', monospace" font-size="16" fill="#6366f1">Bob</text>

  <!-- ========== Unidirectional arrow (5-6s) — Alice → Bob with "connect" label ========== -->
  <g opacity="0">
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.35;0.37;0.42;0.44;1" values="0;0;1;1;0;0"/>
    <line x1="230" y1="170" x2="570" y2="170" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="400" y="161" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#6366f1">connect</text>
  </g>

  <!-- ========== Bidirectional arrow (6s onwards) ========== -->
  <line x1="230" y1="170" x2="570" y2="170" stroke="#6366f1" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)" opacity="0"><animate attributeName="opacity" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.42;0.44;1" values="0;0;1;1"/></line>

  <!-- Timer bar (position in loop) -->
  <rect x="0" y="316" width="800" height="3" fill="#9ca3af" transform="scale(0 1)">
    <animateTransform attributeName="transform" type="scale" dur="14s" repeatCount="indefinite" calcMode="linear" keyTimes="0;1" values="0 1;1 1"/>
  </rect>
</svg>
