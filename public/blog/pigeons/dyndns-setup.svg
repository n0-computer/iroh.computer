<svg viewBox="0 0 940 470" style="background:transparent" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ahb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/></marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#888"/></marker>
  </defs>

  <!-- home network boundary -->
  <rect x="498" y="198" width="418" height="206" rx="10" fill="#808080" fill-opacity="0.05" stroke="#888" stroke-width="1" stroke-dasharray="6 5"/>
  <text x="512" y="218" font-family="'Space Mono', monospace" font-size="11" fill="#888">home network</text>

  <!-- internet -->
  <g>
    <ellipse cx="340" cy="292" rx="86" ry="40" fill="#808080" fill-opacity="0.1" stroke="#888" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="340" y="296" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#888">Internet</text>
  </g>

  <!-- ssh data path: laptop -> router public IP (through the internet) -->
  <line x1="150" y1="288" x2="575" y2="296" stroke="#2563eb" stroke-width="1.6" marker-end="url(#ahb)"/>
  <text x="360" y="272" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#2563eb">ssh 203.0.113.7:22</text>
  <circle cx="212" cy="272" r="9" fill="#2563eb"/><text x="212" y="275.6" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#808080" fill-opacity="0.1" font-weight="bold">2</text>

  <!-- port forward: router -> server -->
  <line x1="645" y1="300" x2="814" y2="300" stroke="#2563eb" stroke-width="1.6" marker-end="url(#ahb)"/>
  <text x="745" y="290" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#2563eb">:22 &#8594; :22</text>
  <circle cx="690" cy="286" r="9" fill="#2563eb"/><text x="690" y="289.6" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#808080" fill-opacity="0.1" font-weight="bold">3</text>

  <!-- DNS lookup: laptop <-> dyndns -->
  <line x1="118" y1="262" x2="270" y2="128" stroke="#888" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ahg)" marker-start="url(#ahg)"/>
  <text x="150" y="200" text-anchor="start" font-family="'Space Mono', monospace" font-size="10" fill="#888">resolve</text>
  <text x="150" y="213" text-anchor="start" font-family="'Space Mono', monospace" font-size="10" fill="#888">the name</text>
  <circle cx="196" cy="178" r="9" fill="#2563eb"/><text x="196" y="181.6" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#808080" fill-opacity="0.1" font-weight="bold">1</text>

  <!-- DDNS updater: router -> dyndns -->
  <line x1="632" y1="268" x2="446" y2="120" stroke="#888" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ahg)"/>
  <text x="545" y="166" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#888">push current IP</text>

  <g>
    <rect x="235.0" y="60.0" width="210" height="64" rx="6" fill="#808080" fill-opacity="0.1" stroke="#888" stroke-width="1.5"/>
    <text x="340" y="79.0" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#888" font-weight="bold">DynDNS provider</text>
    <text x="340" y="98.0" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#888">myserver.dyndns.org</text>
    <text x="340" y="114.0" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#888">&#8594; 203.0.113.7</text>
  </g>

  <g>
    <rect x="64.0" y="266.0" width="64" height="40" rx="3" fill="#808080" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="68.0" y="270.0" width="56" height="32" rx="2" fill="none" stroke="#6366f1" stroke-width="0.8"/>
    <text x="96" y="290.0" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#6366f1">$ ssh</text>
    <polygon points="58,306.0 134,306.0 143,315.0 49,315.0" fill="#808080" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.5"/>
    <text x="96" y="333.0" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#6366f1">Work laptop</text>
  </g>

  <g font-family="'Space Mono', monospace" font-size="10" fill="#888">
    <text x="610" y="272" text-anchor="middle">203.0.113.7</text>
    <polyline points="580,315 570,315 570,272" fill="none" stroke="#888" stroke-width="1.5"/>
    <circle cx="570" cy="270" r="1.5" fill="#888"/>
    <polyline points="640,315 650,315 650,272" fill="none" stroke="#888" stroke-width="1.5"/>
    <circle cx="650" cy="270" r="1.5" fill="#888"/>
    <rect x="580" y="280" width="60" height="40" rx="3" fill="#808080" fill-opacity="0.1" stroke="#888" stroke-width="1.5"/>
    <circle cx="630" cy="314" r="1.5" fill="#d97706"/>
    <text x="610" y="335" text-anchor="middle">192.168.1.1</text>
  </g>

  <g>
    <rect x="819.0" y="264.0" width="46" height="72" rx="4" fill="#808080" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="827.0" y1="276.0" x2="857.0" y2="276.0" stroke="#6366f1" stroke-width="0.8"/>
    <line x1="827.0" y1="282.0" x2="857.0" y2="282.0" stroke="#6366f1" stroke-width="0.8"/>
    <circle cx="854.0" cy="273.0" r="1.6" fill="#d97706"/>
    <rect x="827.0" y="294" width="30" height="16" rx="3" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <text x="842" y="306" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#d97706">sshd</text>
    <text x="842" y="351.0" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#6366f1">home server</text>
    <text x="842" y="365.0" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#888">192.168.1.10</text>
  </g>

  <!-- "changes" note on the public IP -->
  <text x="610" y="256" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#888">(IP keeps changing)</text>

  <!-- config burden tags -->
  <g>
    <rect x="254.2" y="150" width="181.5" height="39" rx="4" fill="#808080" fill-opacity="0.12" stroke="#d97706" stroke-width="1"/>
    <rect x="260.2" y="166.0" width="3" height="7" fill="#d97706"/>
    <text x="350.0" y="166" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#d97706">account + DDNS client</text>
    <text x="350.0" y="181" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#d97706">to push your IP on change</text>
  </g>
  <g>
    <rect x="612.4" y="334" width="175.2" height="39" rx="4" fill="#808080" fill-opacity="0.12" stroke="#d97706" stroke-width="1"/>
    <rect x="618.4" y="350.0" width="3" height="7" fill="#d97706"/>
    <text x="705.0" y="350" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#d97706">manual port-forward rule</text>
    <text x="705.0" y="365" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#d97706">on the router</text>
  </g>
  <g>
    <rect x="519.2" y="420" width="181.5" height="39" rx="4" fill="#808080" fill-opacity="0.12" stroke="#dc2626" stroke-width="1"/>
    <rect x="525.2" y="436.0" width="3" height="7" fill="#dc2626"/>
    <text x="615.0" y="436" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#dc2626">needs a real public IP</text>
    <text x="615.0" y="451" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#dc2626">— impossible behind CGNAT</text>
  </g>
</svg>
