<svg viewBox='0 0 800 520' xmlns='http://www.w3.org/2000/svg'><defs><marker id='arrow' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='#6366f1'/></marker><marker id='arrow-light' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='#818cf8'/></marker></defs><text x='400' y='32' text-anchor='middle' font-family='Space Mono, monospace' font-size='20' fill='#6366f1'>QUIC handshake encryption levels</text><text x='150' y='72' text-anchor='middle' font-family='Space Mono, monospace' font-size='16' fill='#6366f1'>Client</text><line x1='150' y1='88' x2='150' y2='495' stroke='#888' stroke-width='1' stroke-dasharray='4 3'/><text x='650' y='72' text-anchor='middle' font-family='Space Mono, monospace' font-size='16' fill='#6366f1'>Server</text><line x1='650' y1='88' x2='650' y2='495' stroke='#888' stroke-width='1' stroke-dasharray='4 3'/><text x='400' y='115' text-anchor='middle' font-family='Space Mono, monospace' font-size='15' fill='#6366f1'>Initial: ClientHello</text><line x1='150' y1='125' x2='644' y2='125' stroke='#6366f1' stroke-width='1.5' marker-end='url(#arrow)'/><text x='400' y='185' text-anchor='middle' font-family='Space Mono, monospace' font-size='15' fill='#6366f1'>Initial: ACK + ServerHello</text><line x1='650' y1='195' x2='156' y2='195' stroke='#6366f1' stroke-width='1.5' marker-end='url(#arrow)'/><text x='400' y='255' text-anchor='middle' font-family='Space Mono, monospace' font-size='15' fill='#818cf8'>Handshake: server authentication</text><line x1='650' y1='265' x2='156' y2='265' stroke='#818cf8' stroke-width='1.5' marker-end='url(#arrow-light)'/><text x='640' y='300' text-anchor='end' font-family='Space Mono, monospace' font-size='13' fill='#888'>server can now derive data keys</text><text x='400' y='335' text-anchor='middle' font-family='Space Mono, monospace' font-size='15' fill='#6366f1'>Initial: ACK</text><line x1='150' y1='345' x2='644' y2='345' stroke='#6366f1' stroke-width='1.5' marker-end='url(#arrow)'/><text x='400' y='380' text-anchor='middle' font-family='Space Mono, monospace' font-size='13' fill='#888'>Initial keys discarded</text><text x='400' y='415' text-anchor='middle' font-family='Space Mono, monospace' font-size='15' fill='#818cf8'>Handshake: ACK + client authentication</text><line x1='150' y1='425' x2='644' y2='425' stroke='#818cf8' stroke-width='1.5' marker-end='url(#arrow-light)'/><text x='160' y='460' text-anchor='start' font-family='Space Mono, monospace' font-size='13' fill='#888'>client can now derive data keys</text></svg>