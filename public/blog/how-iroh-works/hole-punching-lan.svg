    <line x1="457" y1="61" x2="457" y2="71" stroke="#888" stroke-width="1"/>
    <text x="440" y="91" text-anchor="middle" font-family="'Space Mono', monospace" font-size="13" fill="#374151">relay</text>
  </g>

  <g font-family="'Space Mono', monospace" font-size="10" fill="#888">
