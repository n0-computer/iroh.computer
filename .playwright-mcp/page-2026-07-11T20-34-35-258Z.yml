            - generic [ref=e179]: connections
        - paragraph [ref=e180]: "The whole protocol rides on QUIC's ALPN negotiation. There are three:"
        - table [ref=e183]:
          - rowgroup [ref=e184]:
            - row [ref=e185]:
              - columnheader "ALPN" [ref=e186]
              - columnheader "What it carries" [ref=e187]
          - rowgroup [ref=e188]:
            - row [ref=e189]:
              - cell "mesh-llm/1" [ref=e190]
              - 'cell "Main mesh: gossip, routing, HTTP tunnels, plugin channels" [ref=e191]'
            - row [ref=e192]:
              - cell "mesh-llm-control/1" [ref=e193]
              - cell "Owner control plane (config sync, ownership attestation)" [ref=e194]
            - row [ref=e195]:
              - cell "skippy-stage/2" [ref=e196]
              - cell "Latency-sensitive activation transport for split models" [ref=e197]
        - paragraph [ref=e198]:
          - text: Inside the main
          - code [ref=e199]: mesh-llm/1
          - text: "connection, everything is a bidirectional QUIC stream tagged with a single leading byte that says what kind of stream it is. One connection carries gossip, inference, route queries, and peer-lifecycle events, all demuxed by that first byte:"
        - table [ref=e202]:
          - rowgroup [ref=e203]:
            - row [ref=e204]:
              - columnheader "Byte" [ref=e205]
              - columnheader "Stream type" [ref=e206]
              - columnheader "Description" [ref=e207]
          - rowgroup [ref=e208]:
            - row [ref=e209]:
              - cell "0x01" [ref=e210]
              - cell "GOSSIP" [ref=e211]
              - cell "peer announcements (models, GPU, RTT, capabilities)" [ref=e212]
            - row [ref=e213]:
              - cell "0x04" [ref=e214]
              - cell "TUNNEL_HTTP" [ref=e215]
              - cell "inference requests proxied to a peer" [ref=e216]
            - row [ref=e217]:
              - cell "0x05" [ref=e218]
              - cell "ROUTE_REQUEST" [ref=e219]
              - cell "\"which models do you host?\"" [ref=e220]
            - row [ref=e221]:
              - cell "0x06" [ref=e222]
              - cell "PEER_DOWN" [ref=e223]
              - cell "dead-peer notification" [ref=e224]
            - row [ref=e225]:
              - cell "0x07" [ref=e226]
              - cell "PEER_LEAVING" [ref=e227]
              - cell "graceful shutdown" [ref=e228]
            - row [ref=e229]:
              - cell "0x08" [ref=e230]
              - cell "PLUGIN_CHANNEL" [ref=e231]
              - cell "plugin RPC" [ref=e232]
            - row [ref=e233]:
              - cell "0x0e" [ref=e234]
              - cell "DIRECT_PATH_REQUEST" [ref=e235]
              - cell "share direct addresses for NAT traversal" [ref=e236]
        - paragraph [ref=e237]: The neat part is what this buys you. iroh gives authenticated, NAT-traversing QUIC between any two machines, addressed by public key. So "route to a peer" and "stream activations to the next pipeline stage" become the same primitive as "talk to localhost," just with a different endpoint ID. The networking stops being something you have to think about.
        - paragraph [ref=e238]: iroh provides the secure transport. Mesh LLM builds its own gossip layer on top, so it controls exactly who gets admitted to the mesh, which versions are compatible, and which peers to trust.
        - heading [level=2] [ref=e239]:
          - link "Getting started" [ref=e240] [cursor=pointer]:
            - /url: "#getting-started"
        - paragraph [ref=e241]:
          - text: Users can install the lightweight software (about 18 MB) and either join the public mesh or configure private deployments. The system presents itself as
          - code [ref=e242]: localhost:9337/v1
          - text: to any standard OpenAI client.
        - paragraph [ref=e243]: "A mobile app is coming, built on iroh's Swift SDK. The plan is to speak ACP, the emerging agent standard, so other clients can join the mesh too. The throughline is the same one that motivated the whole project: more peer to peer, fewer closed servers, and no lock-in."
        - list [ref=e244]:
          - listitem [ref=e245]:
            - link "See the code" [ref=e246] [cursor=pointer]:
              - /url: https://github.com/Mesh-LLM/mesh-llm
          - listitem [ref=e247]:
            - link "Mesh LLM Website" [ref=e248] [cursor=pointer]:
              - /url: https://meshllm.cloud
        - generic [ref=e249]:
          - text: Iroh is a dial-any-device networking library that just works. Compose from an ecosystem of ready-made protocols to get the features you need, or go fully custom on a clean abstraction over dumb pipes. Iroh is open source, and already running in production on hundreds of thousands of devices.To get started, take a look at our
