    - article [ref=e46]:
      - generic [ref=e47]:
        - 'heading "Mesh LLM: distributed AI computing on iroh" [level=1] [ref=e48]'
        - generic [ref=e49]:
          - time [ref=e50]: July 11, 2026
          - generic [ref=e51]: by n0 team
      - generic [ref=e52]:
        - paragraph [ref=e53]: When people picture running a large language model, they picture a data center. Racks of GPUs that belong to someone else, a metered API, and a bill that grows every month you succeed. You send your prompts off to a black box and hope the price, the model, and the privacy policy all stay the way they were when you signed up.
        - paragraph [ref=e54]: For a lot of teams that is a bad trade. You give up control over when models change, where your data goes, and what hardware runs your workloads. And as usage grows, so does the bill, with no lever to pull except "pay more."
        - paragraph [ref=e55]:
          - link "Mesh LLM" [ref=e56] [cursor=pointer]:
            - /url: https://meshllm.cloud
          - text: is a different shape. It pools the GPUs and memory you already have, across as many machines as you want to add, and exposes the whole thing as one OpenAI-compatible API. Start one node. Add more later. Let the mesh decide whether a model runs on the box in front of you, routes to a peer, or splits across several machines.
        - heading [level=2] [ref=e57]:
          - 'link "The problem: AI is expensive, and it is somebody else''s" [ref=e58] [cursor=pointer]':
            - /url: "#the-problem-ai-is-expensive-and-it-is-somebody-elses"
        - paragraph [ref=e59]: The popular models are monoliths. Most people reach them through a UI or an API key and pay a large provider to run everything. That is convenient, and it is also a surrender. You do not control when the model gets updated, what memory it runs in, or what hardware sits underneath.
        - paragraph [ref=e60]: "Plenty of businesses and services that depend on these models want the opposite: more control, more pluggability, lower cost. They have GPUs sitting in offices, in closets, under desks. What they are missing is a way to make those machines act like one."
        - heading [level=2] [ref=e61]:
          - 'link "Mesh LLM: run the models yourself" [ref=e62] [cursor=pointer]':
            - /url: "#mesh-llm-run-the-models-yourself"
        - paragraph [ref=e63]:
          - text: The pitch is simple. Run bigger models without buying bigger GPUs. Share compute privately with your team, or publicly with the world, to power agents and chat. Point any OpenAI client at
          - link "http://localhost:9337/v1" [ref=e64] [cursor=pointer]:
            - /url: http://localhost:9337/v1
          - text: and stop caring where the work actually happens.
        - paragraph [ref=e65]: "Under the hood, Mesh LLM distributes model compute across a mesh of iroh endpoints. A request can be served three ways:"
        - list [ref=e66]:
          - listitem [ref=e67]: Run it locally, on this machine's GPU.
          - listitem [ref=e68]: Route it to a peer that already has the model loaded.
          - listitem [ref=e69]: Split a model too big for any single box across several machines, as a pipeline.
        - heading [level=2] [ref=e70]:
          - link "How it works" [ref=e71] [cursor=pointer]:
            - /url: "#how-it-works"
        - paragraph [ref=e72]: The architecture is pluggable. Plugins declare what they provide in a manifest, the runtime starts them, routes calls, and exposes their capabilities over MCP, HTTP, inference, and mesh events. The catalog ships with 40+ models, from half-a-billion-parameter models that fit on a laptop to 235B mixture-of-experts giants.
        - paragraph [ref=e73]: "For the giants, Mesh LLM has a split mode (internally, \"Skippy\"). A model gets partitioned by layer ranges into stages: layers 0 to 15 on one node, 16 to 31 on the next, and so on down the pipeline. Activations flow from one stage to the next, so several modest machines can run a model none of them could hold alone. The OpenAI client never sees any of this. It still just talks to localhost."
        - heading [level=2] [ref=e74]:
          - link "How it uses iroh" [ref=e75] [cursor=pointer]:
            - /url: "#how-it-uses-iroh"
        - paragraph [ref=e76]: Every node, whether it serves models or only sends requests, boots an iroh endpoint. That endpoint is the node's identity, a public key, and its only network surface. There is no central server. iroh handles the hole-punching, NAT traversal, and relay fallback needed to open a direct, authenticated QUIC connection between any two nodes, wherever they sit.
        - paragraph [ref=e77]: To keep that working across the open internet, Mesh LLM runs two iroh relays in different regions, so nodes that cannot reach each other directly always have a fallback path nearby.
        - img [ref=e79]:
          - generic [ref=e150]: Frankfurt
          - generic [ref=e155]: Amsterdam
          - generic [ref=e160]: Chicago
          - generic [ref=e165]: São Paulo
          - generic [ref=e170]: Riyadh
          - generic [ref=e176]:
