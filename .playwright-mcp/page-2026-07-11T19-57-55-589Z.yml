          - 'heading "The Problem: VPNs Are Infrastructure You Didn''t Want to Own" [level=2] [ref=e153]'
          - paragraph [ref=e154]: "Reaching a device that isn't sitting on the public internet usually means standing up a VPN: a coordination server to run and secure, client software to distribute, and firewall rules to get right. Or it means reverse SSH tunnels and all the operational shenanigans that come with them."
          - paragraph [ref=e156]: “It's Tailscale, but as a library. Instead of standing up VPN infrastructure—coordination servers, client software, all the network shenanigans—we dial a device's public key directly from inside our own app and get a direct, encrypted connection.”
          - paragraph [ref=e157]: But what if your app could just dial the other device directly—no separate network to join, no client to install, no infrastructure to babysit?
