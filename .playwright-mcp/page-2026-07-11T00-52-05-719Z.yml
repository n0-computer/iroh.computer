      - paragraph [ref=e150]: "Reaching a device that isn't sitting on the public internet usually means standing up a VPN: a coordination server to run and secure, client software to distribute, and firewall rules to get right. Or it means reverse SSH tunnels and all the operational shenanigans that come with them."
      - paragraph [ref=e152]: “Thinking about implementing a SOCKS proxy on top of iroh to get into my self-hosted service at home without WireGuard infra and all the related network shenanigans.”
      - paragraph [ref=e153]: But what if your app could just dial the other device directly—no separate network to join, no client to install, no infrastructure to babysit?
