    - generic [ref=f1e166]:
      - 'heading "The Problem: Training LLMs is Brutally Expensive" [level=2] [ref=f1e167]'
      - paragraph [ref=f1e168]: The amount of data that needs to be sent between every GPU during training is intense—basically the entire model. Traditional approaches require building massive data centers with specialized high-bandwidth interconnects. There's been no way to do this without concentrated infrastructure.
      - paragraph [ref=f1e170]: “Doubling the network speed halves our compute budget. That's the difference between a $1M model and a $500K model.”
      - paragraph [ref=f1e171]: But what if you could run distributed training over the internet? What if you could use the cheapest compute anywhere in the world and link them all together?
    - generic [ref=f1e174]:
      - generic [ref=f1e175]:
        - 'heading "The Solution: Psyche" [level=2] [ref=f1e176]'
        - paragraph [ref=f1e177]:
          - link "Psyche" [ref=f1e178] [cursor=pointer]:
            - /url: https://github.com/psychefoundation/psyche
          - text: is Nous's distributed training framework. It brings the bandwidth requirements between each machine down from 10Gbps to just 1Gbps—making internet-based distributed training viable.
        - paragraph [ref=f1e179]:
          - text: Data center operators can download a binary and use iroh to connect to every other node in a training run. They do training on their GPUs and communicate information through
          - link "gossip" [ref=f1e180] [cursor=pointer]:
            - /url: https://docs.iroh.computer/proto/iroh-gossip
          - text: ", transferring large amounts of data via"
          - link "blobs" [ref=f1e181] [cursor=pointer]:
            - /url: https://docs.iroh.computer/proto/iroh-blobs
          - text: .
        - paragraph [ref=f1e182]:
          - text: "The core question was simple:"
          - strong [ref=f1e183]: how do you get something to talk to something else?
          - text: Iroh solves this. Gossip is especially useful because Psyche is building a swarm, not just a centralized service.
      - generic [ref=f1e184]:
        - generic [ref=f1e191]:
          - heading "Swarm Architecture" [level=3] [ref=f1e192]
          - paragraph [ref=f1e193]: Built as a decentralized swarm, not a centralized service. Gossip enables coordination across all nodes.
        - generic [ref=f1e198]:
          - heading "100% Utilization" [level=3] [ref=f1e199]
          - paragraph [ref=f1e200]: Most training frameworks do a train step then synchronize. Psyche's asynchronous approach pegs GPUs at 100% and network connections at 100% simultaneously.
        - generic [ref=f1e204]:
          - heading "Saturated Connections" [level=3] [ref=f1e205]
          - paragraph [ref=f1e206]: "The use case: saturate all connections 100%. From iroh, they need reliable delivery of messages and file transfer as fast as it can possibly go."
        - generic [ref=f1e211]:
          - heading "Blockchain Coordination" [level=3] [ref=f1e212]
          - paragraph [ref=f1e213]: High-level coordination through blockchain integration—useful when you need to pay someone and you don't know who they are.
    - generic [ref=f1e215]:
      - paragraph [ref=f1e216]: "Mesh LLM: Inference"
      - heading "Pool GPUs Into One API" [level=2] [ref=f1e217]
      - generic [ref=f1e218]:
        - generic [ref=f1e219]:
          - paragraph [ref=f1e220]:
            - link "Mesh LLM" [ref=f1e221] [cursor=pointer]:
              - /url: https://meshllm.cloud
            - text: pools existing GPU resources across multiple machines and exposes them through a single OpenAI-compatible API, with no central server coordinating the mesh. Every node runs an iroh endpoint, so nodes connect directly to each other over authenticated QUIC instead of routing through a coordinator.
          - paragraph [ref=f1e223]: “Control over when models change, where your data goes, and what hardware runs your workloads.”
        - generic [ref=f1e224]:
          - generic [ref=f1e229]:
            - heading "Local Execution" [level=3] [ref=f1e230]
            - paragraph [ref=f1e231]: A request runs on the requesting machine's GPU, if it's big enough.
          - generic [ref=f1e238]:
            - heading "Peer Routing" [level=3] [ref=f1e239]
            - paragraph [ref=f1e240]: Otherwise, it routes directly to a peer node that already has the model loaded.
          - generic [ref=f1e244]:
            - heading "Pipeline Splitting" [level=3] [ref=f1e245]
            - paragraph [ref=f1e246]: Models too large for any single machine get partitioned by layer ranges across multiple nodes, so modest machines can collectively run what none of them could load alone.
    - generic [ref=f1e248]:
      - heading "Why Relays Matter" [level=2] [ref=f1e249]
      - paragraph [ref=f1e250]:
        - text: "Nous runs 5 iroh relays to ensure reliable connectivity across their distributed training network. Mesh LLM runs two, in different regions, for the same reason. The key insight:"
        - strong [ref=f1e251]: when things deteriorate, they can't break
        - text: .
      - paragraph [ref=f1e252]: Iroh automatically establishes direct connections when possible for maximum throughput. When direct connections aren't possible—due to NATs, firewalls, or network conditions—traffic flows through relays. This fallback mechanism means training and inference keep running even when network conditions change.
    - generic [ref=f1e255]:
      - generic [ref=f1e256]:
        - heading "Managed Relays & Monitoring" [level=2] [ref=f1e257]
        - paragraph [ref=f1e258]:
          - text: The
          - link "n0.computer" [ref=f1e259] [cursor=pointer]:
            - /url: https://n0.computer
          - text: team hosts relays for Nous through the
          - link "iroh services" [ref=f1e260] [cursor=pointer]:
            - /url: https://services.iroh.computer
          - text: service. This provides reliable relay infrastructure without Nous having to manage it themselves.
        - paragraph [ref=f1e261]: We're also partnering with Nous to build better monitoring tools for distributed training—making it easy to understand what's happening at the network level during training runs.
      - paragraph [ref=f1e264]: “iroh does so much low-level networking for us. We don't have to learn about the low-level details of QUIC. When things go wrong, we want to look at the metrics and logs to understand what happened.”
