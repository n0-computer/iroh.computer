              - link "Mesh LLM" [ref=e61] [cursor=pointer]:
                - /url: https://meshllm.cloud
              - text: enables organizations to pool their existing GPU resources across multiple machines and expose them through a single OpenAI-compatible API. Rather than relying on third-party providers, users gain "control over when models change, where your data goes, and what hardware runs your workloads."
            - heading [level=2] [ref=e62]:
              - link [ref=e63] [cursor=pointer]:
                - /url: "#key-features"
            - paragraph [ref=e68]: "The system operates through three distribution strategies:"
            - list [ref=e69]:
              - listitem [ref=e70]: Local execution on the requesting machine's GPU
              - listitem [ref=e71]: Routing to peer nodes that already have models loaded
              - listitem [ref=e72]: Pipeline splitting for models too large for individual hardware
            - paragraph [ref=e73]: The architecture supports 40+ models, ranging from compact half-billion-parameter variants suitable for laptops to massive 235B mixture-of-experts systems. Its "split mode" partitions large models by layer ranges across multiple nodes, allowing modest machines to collectively run models none could handle independently.
            - heading [level=2] [ref=e74]:
              - link "Network infrastructure" [ref=e75] [cursor=pointer]:
                - /url: "#network-infrastructure"
            - paragraph [ref=e76]: Built on iroh, Mesh LLM eliminates central servers through peer-to-peer connectivity using authenticated QUIC connections. The system handles NAT traversal and hole-punching automatically, with two iroh relays providing fallback paths for nodes unable to connect directly.
            - paragraph [ref=e77]: Communication uses tagged QUIC streams carrying gossip announcements, routing queries, inference requests, and plugin channels, all demultiplexed by a single leading byte identifier.
            - heading [level=2] [ref=e78]:
              - link "Getting started" [ref=e79] [cursor=pointer]:
                - /url: "#getting-started"
            - paragraph [ref=e80]:
              - text: Users can install the lightweight software (about 18 MB) and either join the public mesh or configure private deployments. The system presents itself as
