    - article [ref=e46]:
      - generic [ref=e47]:
        - heading "iroh for distributed LLM inference" [level=1] [ref=e48]
        - generic [ref=e49]:
          - time [ref=e50]: July 11, 2026
          - generic [ref=e51]: by n0 team
      - generic [ref=e52]:
        - paragraph [ref=e53]: "Most teams end up with GPUs scattered across machines: a beefy workstation here, a couple of spare desktops there, maybe a rack in the back office. Individually, none of them are big enough to run the model you actually want. So you either buy more hardware, or you send your requests to a third-party API and give up control over when models change, where your data goes, and what hardware runs your workloads."
        - paragraph [ref=e54]:
          - link "Mesh LLM" [ref=e55] [cursor=pointer]:
            - /url: https://meshllm.cloud
          - text: "takes a third path: pool the GPUs you already have into a single OpenAI-compatible API, with no central server coordinating the mesh."
        - heading [level=2] [ref=e56]:
          - link "Three ways to run a request" [ref=e57] [cursor=pointer]:
            - /url: "#three-ways-to-run-a-request"
        - paragraph [ref=e58]: "When a request comes in, Mesh LLM picks one of three strategies:"
        - list [ref=e59]:
          - listitem [ref=e60]:
            - strong [ref=e61]: Local execution
            - text: on the requesting machine's GPU, if it's big enough
          - listitem [ref=e62]:
            - strong [ref=e63]: Routing
            - text: to a peer node that already has the model loaded
          - listitem [ref=e64]:
            - strong [ref=e65]: Pipeline splitting
            - text: ", for models too large for any single machine"
        - paragraph [ref=e66]: Split mode partitions a large model by layer ranges across multiple nodes, so a handful of modest machines can collectively run a model that none of them could load on its own. That's what makes it possible to support 40+ models on the mesh, from half-billion-parameter models small enough for a laptop up to 235B-parameter mixture-of-experts models that need the whole cluster.
        - heading [level=2] [ref=e67]:
          - link "No central server to run" [ref=e68] [cursor=pointer]:
            - /url: "#no-central-server-to-run"
        - paragraph [ref=e69]: Mesh LLM is built on iroh, so nodes connect directly to each other over authenticated QUIC instead of routing requests through a coordinator. Iroh handles NAT traversal and hole-punching automatically, and falls back to a relay when a direct connection isn't possible.
        - img [ref=e71]:
          - generic [ref=e142]: Frankfurt
          - generic [ref=e147]: Amsterdam
          - generic [ref=e152]: Chicago
          - generic [ref=e157]: São Paulo
          - generic [ref=e162]: Riyadh
          - generic [ref=e168]:
            - generic [ref=e170]: 1M+
            - generic [ref=e171]: connections
        - paragraph [ref=e172]: Everything a node needs to say to another node, gossip announcements, routing queries, inference requests, plugin channels, travels over the same tagged QUIC streams, demultiplexed by a single leading byte. That keeps the protocol simple even as the mesh grows.
        - heading [level=2] [ref=e173]:
          - link "Getting started" [ref=e174] [cursor=pointer]:
            - /url: "#getting-started"
        - paragraph [ref=e175]:
          - text: "The client is small (about 18 MB) and drops in as a replacement for any OpenAI-compatible endpoint: point your existing tooling at"
          - code [ref=e176]: localhost:9337/v1
          - text: and it works the same as talking to a hosted API, except the requests stay on hardware you control. From there you can join the public mesh to borrow spare capacity, or configure a private deployment scoped to your own machines.
        - paragraph [ref=e177]:
          - text: If you're building something that needs to move inference (or any other workload) across a fleet of machines without standing up new infrastructure,
          - link "let's talk" [ref=e178] [cursor=pointer]:
            - /url: https://cal.com/team/number-0/iroh-services
          - text: .
        - generic [ref=e179]:
          - text: Iroh is a dial-any-device networking library that just works. Compose from an ecosystem of ready-made protocols to get the features you need, or go fully custom on a clean abstraction over dumb pipes. Iroh is open source, and already running in production on hundreds of thousands of devices.To get started, take a look at our
          - link "docs" [ref=e180] [cursor=pointer]:
            - /url: https://iroh.computer/docs
          - text: ", dive directly into"
          - link "the code" [ref=e181] [cursor=pointer]:
            - /url: https://github.com/n0-computer/iroh
          - text: ", or chat with us in our"
          - link "discord channel" [ref=e182] [cursor=pointer]:
            - /url: https://iroh.computer/discord
          - text: .
